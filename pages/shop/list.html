<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chair 리스트 페이지</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/components/header.css">
    <link rel="stylesheet" href="../../css/components/footer.css">
    <script src="../../js/components/header.js"></script>
    <script src="../../js/pages/allproduct.js"></script>
    <link rel="stylesheet" href="../../css/pages/list.css">
    <script src="../../js/pages/list.js"></script>
</head>
<body>
    <div id="site-header"></div>
    <div class="list-wrap">
        <div class="banner"></div>
        <div class="list-box common-frame">
            <ul class="product-types">
                <li class="chair">의자</li>
                <li class="sofa">소파</li>
                <li class="desk">책상</li>
                <li class="lamp">조명</li>
                <li class="bookself">책장(서랍)</li>
            </ul>
            <div class="select-box">
                <button type="button" class="select-label">
                    <span>전체상품</span>
                    <i class="icon-arrow">
                        <img src="../../assets/icons/list-down.png" alt="열기">
                    </i>
                </button>

                <ul class="select-list">
                    <li>신상품</li>
                    <li>인기상품</li>
                    <li>낮은 가격순</li>
                    <li>높은 가격순</li>
                </ul>
            </div>
            <ul class="product-grid">
                
            </ul>
            <nav>
                <div class="pagination-container"></div>
            </nav>
        </div>
        <div class="bottom-banner common-frame">

        </div>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/components/layout.js"></script>
</body>
</html>
